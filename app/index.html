<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3c7a5b" />

    <title>Shorty Harris — AI-Powered Outbound for Small & Family Businesses</title>
    <meta name="description" content="Shorty Harris finds ideal customers, writes outreach, follows up, and routes hot leads to your team — outbound prospecting on autopilot for small and family businesses." />

    <!-- Site-wide fallback for crawlers/link-unfurlers that don't execute
         JavaScript — every route overrides these at runtime via useSeo()
         for real browsers and JS-executing crawlers (Google). -->
    <meta property="og:site_name" content="Shorty Harris" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Shorty Harris — AI-Powered Outbound for Small & Family Businesses" />
    <meta property="og:description" content="Shorty Harris finds ideal customers, writes outreach, follows up, and routes hot leads to your team — outbound prospecting on autopilot for small and family businesses." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Shorty Harris — AI-Powered Outbound for Small & Family Businesses" />
    <meta name="twitter:description" content="Shorty Harris finds ideal customers, writes outreach, follows up, and routes hot leads to your team — outbound prospecting on autopilot for small and family businesses." />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Shorty Harris",
        "description": "AI-powered outbound prospecting for small and family businesses.",
        "url": "https://shortyharris.com"
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
    <!-- GA4 — no-ops until VITE_GA_MEASUREMENT_ID is set, so this is safe to
         ship even before the real measurement ID is configured. -->
    <script>
      (function () {
        var GA_ID = "%VITE_GA_MEASUREMENT_ID%";
        // When the env var isn't set, Vite leaves the literal "%...%" text in
        // place rather than substituting an empty string — guard against that too.
        if (!GA_ID || GA_ID.charAt(0) === '%') return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag() { window.dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', GA_ID);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
